name: Release Testing & Notion Update

# Triggers on every new release tag (e.g. v1.0.1, v1.1.0)
on:
  push:
    tags:
      - 'v*.*.*'
  # Also allows manual trigger with a custom version label
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.1.0)'
        required: true
        default: 'manual'

jobs:
  # ─── STEP 1: Code quality checks ─────────────────────────────
  code-quality:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

  # ─── STEP 2: Unit tests ───────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run Jest
        run: npx jest --ci --passWithNoTests
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

  # ─── STEP 3: Schema validation against Supabase ───────────────
  schema-validation:
    name: Validate DB Schema
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - name: Check all expected tables exist
        run: |
          TABLES=("profiles" "families" "family_members" "invites" "challenges" "completions" "rewards" "redemptions")
          for TABLE in "${TABLES[@]}"; do
            RESULT=$(curl -s \
              "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='$TABLE'\"}")
            COUNT=$(echo $RESULT | python3 -c "import sys,json; r=json.load(sys.stdin); print(r[0]['count'])" 2>/dev/null || echo "0")
            if [ "$COUNT" != "1" ]; then
              echo "❌ Table missing: $TABLE"
              exit 1
            else
              echo "✅ Table exists: $TABLE"
            fi
          done

  # ─── STEP 4: Update Notion with test results ──────────────────
  update-notion:
    name: Update Notion Stories
    runs-on: ubuntu-latest
    needs: [unit-tests, schema-validation]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Get test results
        id: results
        run: |
          TS_RESULT="${{ needs.code-quality.result }}"
          UNIT_RESULT="${{ needs.unit-tests.result }}"
          SCHEMA_RESULT="${{ needs.schema-validation.result }}"
          if [ "$TS_RESULT" = "success" ] && [ "$UNIT_RESULT" = "success" ] && [ "$SCHEMA_RESULT" = "success" ]; then
            echo "overall=passed" >> $GITHUB_OUTPUT
          else
            echo "overall=failed" >> $GITHUB_OUTPUT
          fi
          echo "ts=$TS_RESULT" >> $GITHUB_OUTPUT
          echo "unit=$UNIT_RESULT" >> $GITHUB_OUTPUT
          echo "schema=$SCHEMA_RESULT" >> $GITHUB_OUTPUT

      - name: Update Notion release page
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: python3 scripts/notion_release_update.py \
          --version "${{ steps.version.outputs.version }}" \
          --ts "${{ steps.results.outputs.ts }}" \
          --unit "${{ steps.results.outputs.unit }}" \
          --schema "${{ steps.results.outputs.schema }}" \
          --overall "${{ steps.results.outputs.overall }}"

      - name: Fail if tests failed
        if: steps.results.outputs.overall == 'failed'
        run: |
          echo "❌ One or more test stages failed. Check Notion for details."
          exit 1
